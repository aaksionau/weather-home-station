name: Build and push images

on:
  push:
    branches: [main]

env:
  # The self-hosted runner shares the Docker daemon on the same host that
  # runs the registry container, so it always reaches it over localhost
  # regardless of the host's LAN IP.
  REGISTRY_HOST: localhost:5000

jobs:
  build-and-push:
    runs-on: self-hosted
    strategy:
      max-parallel: 1
      matrix:
        service:
          - { name: weather-gateway-api, context: ., dockerfile: src/WeatherGateway.API/Dockerfile }
          - { name: weather-processor-worker, context: ., dockerfile: src/WeatherProcessor.Worker/Dockerfile }
          - { name: weather-rules-worker, context: ., dockerfile: src/WeatherRules.Worker/Dockerfile }
          - { name: dashboard-api, context: src/Dashboard.API, dockerfile: src/Dashboard.API/Dockerfile }
          - { name: dashboard-web, context: src/Dashboard.Web, dockerfile: src/Dashboard.Web/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service.name }}
        run: docker build -f "${{ matrix.service.dockerfile }}" -t "${REGISTRY_HOST}/weather/${{ matrix.service.name }}:${{ github.sha }}" "${{ matrix.service.context }}"

      - name: Push ${{ matrix.service.name }}
        run: docker push "${REGISTRY_HOST}/weather/${{ matrix.service.name }}:${{ github.sha }}"

  summary:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Print deploy command
        run: |
          {
            echo "### Images pushed"
            echo "Tag: \`${{ github.sha }}\`"
            echo ""
            echo "Deploy with:"
            echo '```'
            echo "cd terraform/02-platform && terraform apply -var=\"image_tag=${{ github.sha }}\""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
