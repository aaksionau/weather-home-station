services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: weather-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:29092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  api:
    build:
      context: ./src/WeatherGateway.API
    container_name: weather-api
    restart: unless-stopped
    ports:
      - "5135:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Kafka__BootstrapServers: kafka:29092
      Kafka__WeatherReadingsTopic: weather.raw
      OTEL_SERVICE_NAME: weather-gateway-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_METRIC_EXPORT_INTERVAL: "15000"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: weather-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: weather
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather -d weather"]
      interval: 10s
      timeout: 5s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: weather-azurite
    restart: unless-stopped
    command: "azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --skipApiVersionCheck"
    volumes:
      - azurite-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(10000,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  processor:
    build:
      context: ./src/WeatherProcessor.Worker
    container_name: weather-processor
    restart: unless-stopped
    environment:
      Kafka__BootstrapServers: kafka:29092
      Kafka__RawTopic: weather.raw
      Kafka__ProcessedTopic: weather.processed
      Kafka__ConsumerGroupId: weather-processor
      Postgres__ConnectionString: Host=postgres;Port=5432;Database=weather;Username=weather;Password=weather
      OTEL_SERVICE_NAME: weather-processor-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_METRIC_EXPORT_INTERVAL: "15000"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  rules-engine:
    build:
      context: ./src/WeatherRules.Worker
    container_name: weather-rules-engine
    restart: unless-stopped
    environment:
      Kafka__BootstrapServers: kafka:29092
      Kafka__ProcessedTopic: weather.processed
      Kafka__AlertsTopic: weather.alerts
      Kafka__ConsumerGroupId: weather-rules-engine
      Postgres__ConnectionString: Host=postgres;Port=5432;Database=weather;Username=weather;Password=weather
      BlobStorage__ConnectionString: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;
      BlobStorage__ContainerName: rules
      BlobStorage__RulesBlobName: weather-alert-rules.json
      OTEL_SERVICE_NAME: weather-rules-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_METRIC_EXPORT_INTERVAL: "15000"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      azurite:
        condition: service_healthy

  dashboard-api:
    build:
      context: ./src/Dashboard.API
    container_name: weather-dashboard-api
    restart: unless-stopped
    ports:
      - "5185:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Postgres__ConnectionString: Host=postgres;Port=5432;Database=weather;Username=weather;Password=weather
      OTEL_SERVICE_NAME: weather-dashboard-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_METRIC_EXPORT_INTERVAL: "15000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard-web:
    build:
      context: ./src/Dashboard.Web
    container_name: weather-dashboard-web
    restart: unless-stopped
    ports:
      - "5190:80"
    depends_on:
      dashboard-api:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    container_name: weather-otel-collector
    restart: unless-stopped
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - loki

  loki:
    image: grafana/loki:3.2.0
    container_name: weather-loki
    restart: unless-stopped
    volumes:
      - loki-data:/loki

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: weather-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:11.3.1
    container_name: weather-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki

volumes:
  kafka-data:
  postgres-data:
  azurite-data:
  loki-data:
  prometheus-data:
  grafana-data:
